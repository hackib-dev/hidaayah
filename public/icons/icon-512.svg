<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#2a6b5f"/>
  <defs>
    <mask id="cm">
      <rect width="512" height="512" fill="white"/>
      <!-- Offset cutout: same ratio as logo component (cx+6/15 of r offset right, cy-4/15 up) -->
      <!-- Main r=120, so cutout offset = 6/15*120=48 right, 4/15*120=32 up, cutout r=13/15*120=104 -->
      <circle cx="304" cy="224" r="104" fill="black"/>
    </mask>
  </defs>
  <!-- Crescent moon centered at 256,256 with r=120 -->
  <circle cx="256" cy="256" r="120" fill="white" mask="url(#cm)"/>
  <!-- Star dot: offset 30/15*120=240? No — in component: cx=30,cy=7 on 36 grid.
       Relative to center 18,18: +12 right, -11 up. Scale: +12/15*120=96 right, -11/15*120=88 up -->
  <circle cx="352" cy="168" r="20" fill="white"/>
</svg>
